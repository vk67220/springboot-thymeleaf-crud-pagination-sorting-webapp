name: Jenkins Installation using Jenkins.sh

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  jenkins-install:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Configure AWS via OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::597918493080:role/github-oidc-selfhosted-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 📝 Create Jenkins.sh dynamically (UBUNTU 24 FIXED)
      - name: Create Jenkins.sh
        run: |
          cat << 'EOF' > Jenkins.sh
          #!/bin/bash
          set -e

          echo "Updating packages..."
          sudo apt update -y

          echo "Installing base dependencies..."
          sudo apt install -y openjdk-17-jre-headless curl gnupg ca-certificates

          echo "Removing old Jenkins repo (if exists)..."
          sudo rm -f /etc/apt/sources.list.d/jenkins.list
          sudo rm -f /usr/share/keyrings/jenkins-keyring.asc

          echo "Adding Jenkins keyring..."
          curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | \
            sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

          echo "Adding Jenkins repository..."
          echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | \
            sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

          echo "Updating apt sources..."
          sudo apt update -y

          echo "Installing Jenkins..."
          sudo apt install -y jenkins

          echo "Starting Jenkins..."
          sudo systemctl daemon-reexec
          sudo systemctl enable jenkins
          sudo systemctl start jenkins
          EOF

          chmod +x Jenkins.sh

      # 🚀 Run Jenkins Installation Script
      - name: Run Jenkins.sh
        run: bash Jenkins.sh

      # 🔎 Check Jenkins Version
      - name: Jenkins Version
        run: |
          sleep 20
          jenkins --version || sudo jenkins --version || true

      - name: Check Jenkins Service Status
        run: sudo systemctl status jenkins --no-pager || true