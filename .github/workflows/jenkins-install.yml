          wget -q -O - https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/jenkins-keyring.gpg > /dev/null

          echo "Adding Jenkins repository..."
          echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/" \
            | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

          echo "Updating apt sources..."
          sudo apt update -y

          echo "Installing Jenkins..."
          sudo apt install -y jenkins

          echo "Starting Jenkins..."
          sudo systemctl daemon-reexec
          sudo systemctl enable jenkins
          sudo systemctl start jenkins
          EOF

          chmod +x Jenkins.sh

      # ---------------------------------------
      # Run Installation Script
      # ---------------------------------------
      - name: Run Jenkins Installation
        run: bash Jenkins.sh

      # ---------------------------------------
      # Show Jenkins Version
      # ---------------------------------------
      - name: Jenkins Version
        run: |
          sleep 20
          jenkins --version || sudo jenkins --version || true

      # ---------------------------------------
      # Check Jenkins Service Status
      # ---------------------------------------
      - name: Check Jenkins Service Status
        run: sudo systemctl status jenkins --no-pager || true

      # ---------------------------------------
      # Print Initial Admin Password
      # ---------------------------------------
      - name: Print Jenkins Initial Password
        run: sudo cat /var/lib/jenkins/secrets/initialAdminPassword || true
