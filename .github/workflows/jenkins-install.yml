name: Install Jenkins

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  jenkins-install:
    runs-on: self-hosted

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------
      # AWS OIDC Login (your setup)
      # -------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::597918493080:role/github-oidc-selfhosted-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # -------------------------------
      # Install Jenkins (Your Script)
      # -------------------------------
      - name: Install Jenkins
        run: |
          set -e

          echo "Updating packages..."
          sudo apt update -y

          echo "Installing dependencies..."
          sudo apt install -y openjdk-17-jre-headless wget ca-certificates curl

          echo "Create keyrings directory..."
          sudo mkdir -p /etc/apt/keyrings

          echo "Download Jenkins GPG key..."
          sudo wget -q -O /etc/apt/keyrings/jenkins-keyring.asc \
          https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key

          echo "Add Jenkins repository..."
          echo "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" \
          | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

          echo "Update apt..."
          sudo apt update -y

          echo "Install Jenkins..."
          sudo apt install -y jenkins

          echo "Start Jenkins..."
          sudo systemctl daemon-reexec
          sudo systemctl enable jenkins
          sudo systemctl start jenkins

      # -------------------------------
      # Verify Jenkins
      # -------------------------------
      - name: Jenkins Version
        run: |
          sleep 20
          jenkins --version || sudo jenkins --version || true

      - name: Jenkins Status
        run: sudo systemctl status jenkins --no-pager || true

      - name: Jenkins Initial Password
        run: sudo cat /var/lib/jenkins/secrets/initialAdminPassword || true