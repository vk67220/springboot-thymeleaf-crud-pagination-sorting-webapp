name: Jenkins Installation using Jenkins.sh

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  jenkins-install:
    runs-on: self-hosted

    steps:
      # -----------------------------------
      # Checkout
      # -----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------
      # AWS OIDC Login
      # -----------------------------------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::597918493080:role/github-oidc-selfhosted-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # -----------------------------------
      # Install Jenkins (FIXED SCRIPT)
      # -----------------------------------
      - name: Install Jenkins
        run: |
          echo "Updating packages..."
          sudo apt update -y

          echo "Installing dependencies..."
          sudo apt install -y fontconfig openjdk-17-jre-headless wget gnupg2 ca-certificates curl

          echo "Removing old Jenkins repo..."
          sudo rm -f /etc/apt/sources.list.d/jenkins.list
          sudo rm -f /usr/share/keyrings/jenkins-keyring.asc

          echo "Adding Jenkins GPG key..."
          wget -q -O - https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
            | sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

          echo "Adding Jenkins repository..."
          echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" \
            | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

          echo "Updating apt sources..."
          sudo apt update -y

          echo "Installing Jenkins..."
          sudo apt install -y jenkins

          echo "Starting Jenkins..."
          sudo systemctl daemon-reexec
          sudo systemctl enable jenkins
          sudo systemctl start jenkins

      # -----------------------------------
      # Check Jenkins
      # -----------------------------------
      - name: Jenkins Version
        run: |
          sleep 20
          jenkins --version || sudo jenkins --version || true

      - name: Jenkins Status
        run: sudo systemctl status jenkins --no-pager || true

      - name: Jenkins Initial Password
        run: sudo cat /var/lib/jenkins/secrets/initialAdminPassword || true