#!/bin/bash
set -e

echo "======================================="
echo "   DEVOPS ENTERPRISE JENKINS SETUP"
echo "======================================="

echo "Updating packages..."
sudo apt update -y

echo "Installing base dependencies..."
sudo apt install -y ca-certificates curl gnupg lsb-release unzip software-properties-common

############################################################
# REMOVE OLD JENKINS REPO (Fix NO_PUBKEY ERROR)
############################################################
echo "Cleaning old Jenkins repo..."
sudo rm -f /etc/apt/sources.list.d/jenkins.list
sudo rm -f /usr/share/keyrings/jenkins-keyring.asc

############################################################
# INSTALL JAVA 17
############################################################
echo "Installing Java 17..."
sudo apt install -y openjdk-17-jdk

############################################################
# ADD NEW JENKINS KEY + REPO (UBUNTU 24 COMPATIBLE)
############################################################
echo "Adding Jenkins keyring..."
curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | \
sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

echo "Adding Jenkins repo..."
echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | \
sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

sudo apt update -y

############################################################
# INSTALL JENKINS
############################################################
echo "Installing Jenkins..."
sudo apt install -y jenkins

sudo systemctl daemon-reexec
sudo systemctl enable jenkins
sudo systemctl start jenkins

############################################################
# INSTALL DOCKER
############################################################
echo "Installing Docker..."
curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg

echo \
"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] \
https://download.docker.com/linux/ubuntu noble stable" | \
sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

sudo apt update -y
sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

sudo systemctl enable docker
sudo systemctl start docker

############################################################
# GIVE DOCKER ACCESS TO JENKINS
############################################################
echo "Adding Jenkins user to Docker group..."
sudo usermod -aG docker jenkins
sudo usermod -aG docker ubuntu

############################################################
# INSTALL AWS CLI v2
############################################################
echo "Installing AWS CLI..."
curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
unzip -q awscliv2.zip
sudo ./aws/install
rm -rf aws awscliv2.zip

############################################################
# INSTALL KUBECTL
############################################################
echo "Installing kubectl..."
curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
rm kubectl

############################################################
# INSTALL EKSCTL
############################################################
echo "Installing eksctl..."
curl --silent --location \
"https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" \
| tar xz -C /tmp
sudo mv /tmp/eksctl /usr/local/bin

############################################################
# INSTALL TERRAFORM (HASHICORP OFFICIAL)
############################################################
echo "Installing Terraform..."
curl -fsSL https://apt.releases.hashicorp.com/gpg | \
sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg

echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
https://apt.releases.hashicorp.com noble main" | \
sudo tee /etc/apt/sources.list.d/hashicorp.list

sudo apt update -y
sudo apt install -y terraform

############################################################
# INSTALL TRIVY
############################################################
echo "Installing Trivy..."
sudo apt install -y wget apt-transport-https gnupg
wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg

echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
https://aquasecurity.github.io/trivy-repo/deb noble main" | \
sudo tee /etc/apt/sources.list.d/trivy.list

sudo apt update -y
sudo apt install -y trivy

############################################################
# RESTART SERVICES
############################################################
echo "Restarting services..."
sudo systemctl restart docker
sudo systemctl restart jenkins

############################################################
# SHOW STATUS
############################################################
echo "======================================="
echo "Versions Installed:"
java -version
docker --version
aws --version
kubectl version --client
eksctl version
terraform version
trivy --version

echo "======================================="
echo "Jenkins Initial Password:"
sudo cat /var/lib/jenkins/secrets/initialAdminPassword
echo "======================================="
echo "OPEN IN BROWSER:"
echo "http://<YOUR-SERVER-IP>:8080"
